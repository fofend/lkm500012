<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="google-site-verification" content="YspUA0A6dj_tFIE1xhKtJ6c5J5k9xj0iMEY7dSuonfI" />
    <meta name="naver-site-verification" content="e485c59ebc6290f7054e809c671f4c37070bc20f" />

    <title>나나라이브 - 실시간 익명 채팅 및 랜덤 채팅</title>
    <style>
        :root { --primary: #007AFF; --success: #34c759; --error: #FF3B30; --bg: #f2f2f7; --male: #007AFF; --female: #FF2D55; }
        * { box-sizing: border-box; } 

        body { 
            font-family: -apple-system, sans-serif; 
            max-width: 500px; 
            margin: 0 auto; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
        }

        .stats-bar { background: #333; color: #fff; font-size: 10px; padding: 5px 15px; display: flex; justify-content: space-between; flex-shrink: 0; z-index: 10; }
        .top-bar { background: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d1d1d6; flex-shrink: 0; z-index: 10; }
        
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
        }

        .ad-banner {
            background: #fff;
            padding: 8px 0;
            text-align: center;
            border-top: 1px solid #d1d1d6;
            flex-shrink: 0;
        }
        .ad-disclaimer { font-size: 9px; color: #aeaeae; margin-top: 4px; display: block; }

        @media (min-width: 768px) {
            #main-ad-banner { display: block !important; }
        }

        .gender-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 4px; font-weight: bold; }
        .gender-male { background: var(--male); }
        .gender-female { background: var(--female); }
        .msg-line { max-width: 85%; display: flex; flex-direction: column; flex-shrink: 0; }
        .msg-line.me { align-self: flex-end; align-items: flex-end; }
        .msg-line.partner { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-break: break-all; position: relative; }
        .me .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .partner .bubble { background: #e9e9eb; color: black; border-bottom-left-radius: 4px; }
        .sender-info { font-size: 11px; color: #8e8e93; margin-bottom: 4px; display: flex; align-items: center; }
        .input-area { padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); background: #fff; border-top: 1px solid #d1d1d6; flex-shrink: 0; }
        .btn-group { display: flex; gap: 8px; align-items: center; }
        #msg-input { flex: 1; padding: 12px; border: 1px solid #d1d1d6; border-radius: 20px; outline: none; background: #f2f2f7; font-size: 16px !important; }
        .btn-send { background: var(--primary); color: white; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; border-radius: 50%; }
        .btn-next { background: var(--success); color: white; padding: 10px 15px; font-size: 13px; height: 42px; border: none; border-radius: 20px; font-weight: bold; }
        .btn-block { color: var(--error); background: none; font-size: 14px; border: none; }
        #setup-screen { padding: 40px 25px; background: white; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #setup-screen h1 { text-align: center; margin-bottom: 20px; font-size: 28px; letter-spacing: -1px; }
        .setup-label { display: block; width: 100%; max-width: 320px; font-size: 13px; font-weight: 600; color: #8e8e93; margin: 15px 0 6px 5px; }
        #setup-screen input, #setup-screen select { width: 100%; max-width: 320px; height: 48px; border-radius: 12px; background: #f2f2f7; border: 1px solid #d1d1d6; padding: 0 15px; font-size: 16px !important; margin-bottom: 5px; outline: none; display: block; }
        .btn-start { width: 100%; max-width: 320px; background: var(--primary); color: white; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 35px; border: none; box-shadow: 0 4px 12px rgba(0,122,255,0.2); cursor: pointer; }
        .system { align-self: center; font-size: 12px; color: #8e8e93; background: #f2f2f7; padding: 6px 15px; border-radius: 15px; margin: 8px 0; text-align: center; width: fit-content; }
        /* 도배 경고 전용 스타일 */
        .system-err { color: #FF3B30 !important; background: #FFE9E9 !important; border: 1px solid #FF3B30; }
    </style>
</head>
<body>
    <div class="stats-bar">
        <span>접속자: <span id="stat-users">0</span>명</span>
        <span>대기중: <span id="stat-waiting">0</span>명</span>
    </div>

    <div class="top-bar" id="chat-top-bar" style="display:none;">
        <button class="btn-block" onclick="blockUser()">🚫 차단</button>
        <span style="font-weight: bold; font-size: 16px;">💬 익명 대화</span>
        <button style="color:#8e8e93; background:none; font-size: 14px; border:none;" onclick="exitToSetup()">나가기</button>
    </div>

    <div id="setup-screen">
        <h1>나나라이브</h1>
        <label class="setup-label">닉네임</label>
        <input type="text" id="nickname" placeholder="미입력 시 익명">
        <label class="setup-label">내 성별</label>
        <select id="gender"><option value="male">남성</option><option value="female">여성</option></select>
        <label class="setup-label">찾는 상대</label>
        <select id="wantGender"><option value="all">누구나 (빠른 매칭)</option><option value="female">여성만</option><option value="male">남성만</option></select>
        <label class="setup-label">관심사</label>
        <input type="text" id="interest" placeholder="예: 게임, 요리, 운동">
        <button class="btn-start" onclick="startMatching()">매칭 시작하기</button>
    </div>

    <div id="chat-screen" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div id="chat-box"></div>
        
        <div id="main-ad-banner" class="ad-banner">
            <a href="https://link.coupang.com/a/ekXtuF" target="_blank" referrerpolicy="unsafe-url">
                <img src="https://ads-partners.coupang.com/banners/979326?subId=&traceId=V0-301-5a8c79a76485eb21-I979326&w=320&h=50" alt="광고배너" style="max-width: 100%; height: auto; border-radius: 4px;">
            </a>
            <span class="ad-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다.</span>
        </div>

        <div class="input-area">
            <div class="btn-group">
                <button class="btn-next" onclick="requestRematch()">다음</button>
                <input type="text" id="msg-input" placeholder="상대를 찾는 중..." disabled onkeypress="if(event.keyCode==13) send()">
                <button id="send-btn" class="btn-send" disabled onclick="send()">✈️</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const adBanner = document.getElementById('main-ad-banner');
        let myData = {};
        let partnerGender = "";

        function updateAdVisibility(isVisible) {
            if (window.innerWidth < 768) {
                adBanner.style.display = isVisible ? 'block' : 'none';
            } else {
                adBanner.style.display = 'block';
            }
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 30);
        }

        socket.on('server-stats', (stats) => {
            document.getElementById('stat-users').innerText = stats.currentUsers;
            document.getElementById('stat-waiting').innerText = stats.waiting;
        });

        // [수정] 도배 경고 중복 방지 로직
        socket.on('system-err', (msg) => {
            const chatBox = document.getElementById('chat-box');
            const existingErr = document.querySelector('.system-err');
            if (!existingErr) {
                chatBox.innerHTML += `<div class="system system-err">⚠️ ${msg}</div>`;
                scrollToBottom();
            }
        });

        function startMatching() {
            myData = {
                nickname: document.getElementById('nickname').value.trim() || "익명",
                gender: document.getElementById('gender').value,
                wantGender: document.getElementById('wantGender').value,
                interest: document.getElementById('interest').value.trim()
            };
            socket.emit('join', myData);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-top-bar').style.display = 'flex';
            updateAdVisibility(true);
            document.getElementById('chat-box').innerHTML = '<div class="system">새로운 상대를 검색 중입니다...</div>';
            setInputState(false);
        }

        socket.on('matched', (data) => {
            partnerGender = data.partnerGender;
            updateAdVisibility(false);
            const gName = partnerGender === 'male' ? '남' : '여';
            const tag = `<span class="gender-tag ${partnerGender === 'male' ? 'gender-male' : 'gender-female'}">${gName}</span>`;
            document.getElementById('chat-box').innerHTML = `<div class="system">${tag} ${data.msg}</div>`;
            setInputState(true);
        });

        socket.on('partner-left', (msg) => {
            updateAdVisibility(true);
            document.getElementById('chat-box').innerHTML += `<div class="system">⚠️ ${msg || '상대방이 대화를 종료했습니다.'}</div>`;
            setInputState(false);
            scrollToBottom();
        });

        socket.on('start-re-match', () => {
            updateAdVisibility(true); 
            socket.emit('join', myData);
            document.getElementById('chat-box').innerHTML = '<div class="system">새로운 상대를 검색 중입니다...</div>';
            setInputState(false);
        });

        socket.on('return-to-setup', () => {
            updateAdVisibility(true); 
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('chat-top-bar').style.display = 'none';
        });

        function setInputState(enabled) {
            const input = document.getElementById('msg-input');
            const btn = document.getElementById('send-btn');
            input.disabled = !enabled;
            btn.disabled = !enabled;
            input.placeholder = enabled ? "메시지 입력..." : "상대를 찾는 중...";
            if(enabled) input.focus();
            scrollToBottom();
        }

        function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(val && !input.disabled) {
                socket.emit('message', val);
                input.value = '';
                input.focus();
            }
        }

        socket.on('message-ok', (text) => {
            const chatBox = document.getElementById('chat-box');
            // 정상 전송 시 기존 경고문 삭제
            const existingErr = document.querySelector('.system-err');
            if(existingErr) existingErr.remove();

            chatBox.innerHTML += `<div class="msg-line me"><span class="sender-info">나</span><div class="bubble">${text}</div></div>`;
            scrollToBottom();
        });

        socket.on('chat-msg', (data) => {
            const chatBox = document.getElementById('chat-box');
            // 대화가 오면 기존 경고문 삭제
            const existingErr = document.querySelector('.system-err');
            if(existingErr) existingErr.remove();

            const gTag = `<span class="gender-tag ${partnerGender === 'male' ? 'gender-male' : 'gender-female'}">${partnerGender === 'male' ? '남' : '여'}</span>`;
            chatBox.innerHTML += `<div class="msg-line partner"><span class="sender-info">${gTag} ${data.sender}</span><div class="bubble">${data.text}</div></div>`;
            scrollToBottom();
        });

        function blockUser() { if(confirm("이 유저를 차단하고 새로운 상대를 찾을까요?")) socket.emit('block-user'); }
        function exitToSetup() { if(confirm("대화를 종료하고 메인으로 나갈까요?")) socket.emit('leave-chat'); }
        function requestRematch() { if(confirm("현재 대화를 종료하고 다음 상대와 연결할까요?")) socket.emit('re-match'); }
    </script>
</body>
</html>
