<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나나라이브 - 실시간 익명 채팅</title>
    <meta name="description" content="나나라이브에서 실시간 익명 채팅과 랜덤 채팅을 즐겨보세요.">
    <meta property="og:title" content="나나라이브">
    <meta property="og:description" content="실시간 익명 채팅 및 랜덤 채팅">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nana-live.onrender.com/">
    <style>
        :root {
            --primary: #8E44AD;
            --error: #FF3B30;
            --bg-gradient: linear-gradient(135deg, #2c0a3d 0%, #8e44ad 50%, #c15ee2 100%);
            --card: rgba(255, 255, 255, 0.95);
            --male: #007AFF;
            --female: #FF2D55;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html {
            background: var(--bg-gradient) no-repeat center center fixed;
            background-size: cover;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            background: transparent;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            color: #fff;
        }

        /* 상단 상태 바: 마케팅 문구 포함 */
        .stats-bar {
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.95);
            font-size: 11px;
            padding: 7px 15px;
            display: none;
            justify-content: space-between;
            z-index: 100;
            backdrop-filter: blur(8px);
            font-weight: 500;
        }

        .top-bar {
            background: #fff;
            padding: 12px 15px;
            display: none;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d1d1d6;
            z-index: 10;
            color: #000;
        }

        #setup-screen {
            padding: 40px 25px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #setup-screen h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .step-container {
            display: none;
            width: 100%;
            max-width: 320px;
            flex-direction: column;
            align-items: center;
        }

        .step-container.active {
            display: flex;
        }

        .step-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .modern-input {
            width: 100%;
            height: 56px;
            border-radius: 18px;
            background: var(--card);
            border: none;
            padding: 0 20px;
            font-size: 18px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            color: #000;
        }

        .option-btn {
            width: 100%;
            padding: 20px;
            margin: 8px 0;
            border-radius: 18px;
            border: none;
            background: var(--card);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
        }

        .btn-next-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            color: var(--primary);
            border: none;
            font-size: 24px;
            font-weight: bold;
        }

        #chat-screen {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            color: #000;
            background: #fff;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 12px;
        }

        .msg-line {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .msg-line.me {
            align-items: flex-end;
        }

        .msg-line.partner {
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-all;
            max-width: 85%;
        }

        .me .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .partner .bubble {
            background: #f2f2f7;
            color: black;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 10px 15px calc(10px + env(safe-area-inset-bottom));
            background: #fff;
            border-top: 1px solid #eee;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #eee;
            border-radius: 25px;
            outline: none;
            background: #f8f8f8;
            font-size: 16px;
        }

        .system {
            align-self: center;
            font-size: 12px;
            color: #8e8e93;
            background: #f2f2f7;
            padding: 8px 15px;
            border-radius: 15px;
            margin: 8px 0;
            width: fit-content;
            text-align: center;
            line-height: 1.5;
        }

        .gender-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* 타이핑 말풍선 애니메이션 */
        .typing-bubble {
            display: flex;
            gap: 4px;
            padding: 12px 18px !important;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #8e8e93;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-8px);
            }
        }
    </style>
</head>

<body>
    <div class="stats-bar" id="top-stats">
        <span id="stat-left">실시간 매칭 중...</span>
        <span id="stat-right">매칭 상태 원활</span>
    </div>

    <div class="top-bar" id="chat-top-bar">
        <button style="color:var(--error); background:none; border:none; font-weight:600;"
            onmousedown="blockUser(); return false;">🚫 차단</button>
        <span style="font-weight: 800; font-size: 17px; letter-spacing: -1px;">나나라이브</span>
        <button style="color:#8e8e93; background:none; border:none;"
            onmousedown="exitToSetup(); return false;">나가기</button>
    </div>

    <div id="setup-screen">
        <h1>나나라이브</h1>
        <div class="step-container active" id="step-1">
            <div class="step-title">어떤 닉네임을 쓰실까요?</div>
            <input type="text" id="nickname" class="modern-input" placeholder="익명" maxlength="10"
                onkeypress="if(event.keyCode==13) goNext(2)">
            <button class="btn-next-circle" onclick="goNext(2)">➔</button>
        </div>
        <div class="step-container" id="step-2">
            <div class="step-title">당신의 성별은?</div>
            <button class="option-btn" onclick="selectGender('male')">🙋‍♂️ 남성</button>
            <button class="option-btn" onclick="selectGender('female')">🙋‍♀️ 여성</button>
        </div>
        <div class="step-container" id="step-3">
            <div class="step-title">누구와 대화하고 싶나요?</div>
            <button class="option-btn" onclick="selectWantGender('all')">🌈 누구나</button>
            <button class="option-btn" onclick="selectWantGender('female')">🙋‍♀️ 여성만</button>
            <button class="option-btn" onclick="selectWantGender('male')">🙋‍♂️ 남성만</button>
        </div>
        <div class="step-container" id="step-4">
            <div class="step-title">관심사를 적어주세요</div>
            <input type="text" id="interest" class="modern-input" placeholder="예: 운동, 음악" maxlength="15"
                onkeypress="if(event.keyCode==13) startMatching()">
            <button onclick="startMatching()"
                style="width:100%; background:#fff; color:var(--primary); padding:20px; border-radius:18px; font-size:28px; font-weight:900; border:none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); letter-spacing:-1px;">채팅
                시작하기</button>

        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-box"></div>
        <div class="input-area">
            <div class="btn-group">
                <button onmousedown="requestRematch(); return false;"
                    style="background:#eee; padding: 10px 15px; border-radius: 20px; border:none; font-size:13px; font-weight:bold; flex-shrink:0;">다음</button>
                <input type="text" id="msg-input" placeholder="메시지 입력..." disabled autocomplete="off" autocorrect="off"
                    autocapitalize="off" spellcheck="false" onkeypress="if(event.keyCode==13) send(event)">
                <button id="send-btn" disabled onmousedown="send(event); return false;"
                    style="background:var(--primary); color:white; width:42px; height:42px; border:none; border-radius:50%; flex-shrink:0;">✈️</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ reconnection: true });
        let myData = { nickname: '', gender: '', wantGender: '', interest: '' };
        let currentStep = 1, partnerGender = "", lastMessage = "", repeatCount = 0, alertShown = false;

        function goNext(s) { document.getElementById(`step-${currentStep}`).classList.remove('active'); document.getElementById(`step-${s}`).classList.add('active'); currentStep = s; }
        function selectGender(v) { myData.gender = v; goNext(3); }
        function selectWantGender(v) { myData.wantGender = v; goNext(4); }

        function startMatching() {
            myData.nickname = document.getElementById('nickname').value.trim() || "익명";
            myData.interest = document.getElementById('interest').value.trim();
            socket.emit('join', myData);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-top-bar').style.display = 'flex';
            document.getElementById('top-stats').style.display = 'flex'; // 채팅 진입 시 일단 노출
            document.getElementById('chat-box').innerHTML = '<div class="system">🚀 새로운 상대를 검색 중입니다...</div>';
            setInputState(false);
        }

        // 상대방이 타이핑 중이라는 신호를 받았을 때
let typingTimeout;
socket.on('partner-typing', () => {
    console.log("상대방 신호 수신 성공!"); // 이제 콘솔에 이게 뜰 겁니다!

    let loader = document.getElementById('typing-loader');
    
    // 화면에 아직 점 3개가 없다면 새로 만듭니다
    if (!loader) {
        const chatBox = document.getElementById('chat-box');
        loader = document.createElement('div');
        loader.id = 'typing-loader';
        loader.className = 'msg-line partner';
        loader.innerHTML = `
            <div class="bubble typing-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;
        chatBox.appendChild(loader);
        scrollToBottom();
    }
    
    // 3초 동안 추가 입력이 없으면 점 3개를 지웁니다
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        const currentLoader = document.getElementById('typing-loader');
        if (currentLoader) currentLoader.remove();
    }, 2000);
});

        socket.on('matched', (d) => {
            partnerGender = d.partnerGender;
            const tagColor = partnerGender === 'male' ? 'var(--male)' : 'var(--female)';
            const tagText = partnerGender === 'male' ? '남' : '여';
            const interestTxt = d.partnerInterest ? `<br><span style="color:#8e8e93">상대 관심사: ${d.partnerInterest}</span>` : "";
            document.getElementById('chat-box').innerHTML = `<div class="system"><span class="gender-tag" style="background:${tagColor}">${tagText}</span> 상대방과 연결되었습니다.${interestTxt}</div>`;
            setInputState(true);
        });
        // 상대방이 타이핑을 멈추거나 메시지를 보내면 점 세 개를 즉시 제거
socket.on('stop-partner-typing', () => {
    const loader = document.getElementById('typing-loader');
    if (loader) loader.remove();
    if (window.typingTimeout) clearTimeout(window.typingTimeout);
});
        socket.on('message-ok', (t) => { document.getElementById('chat-box').innerHTML += `<div class="msg-line me"><div class="bubble">${t}</div></div>`; scrollToBottom(); });
        socket.on('chat-msg', (d) => { const loader = document.getElementById('typing-loader');
    if (loader) loader.remove();
            document.getElementById('chat-box').innerHTML += `<div class="msg-line partner"><div class="bubble">${d.text}</div></div>`; scrollToBottom(); });
        socket.on('partner-left', (m) => { document.getElementById('chat-box').innerHTML += `<div class="system">⚠️ ${m}</div>`; setInputState(false); });
        socket.on('start-re-match', () => { socket.emit('join', myData); document.getElementById('chat-box').innerHTML = '<div class="system">🚀 새로운 상대를 검색 중입니다...</div>'; setInputState(false); });

        // [사장님 지시 핵심 로직] 상단 바 문구 제어
        socket.on('server-stats', (d) => {
            const statsBar = document.getElementById('top-stats');
            const sLeft = document.getElementById('stat-left');
            const sRight = document.getElementById('stat-right');

            if (document.getElementById('chat-screen').style.display === 'flex') {
                statsBar.style.display = 'flex';

                if (d.currentUsers >= 50) {
                    // 50명 이상일 때: 실시간 정보 노출
                    sLeft.innerHTML = `접속자: <span>${d.currentUsers}</span>명`;
                    sRight.innerHTML = `대기중: <span>${d.waiting}</span>명`;
                } else if (d.currentUsers <= 5) {
                    // 5명 이하일 때: 매칭 원활 멘트
                    sLeft.innerHTML = `🚀 실시간 매칭 중...`;
                    sRight.innerHTML = `✨ 매칭 상태 원활`;
                } else {
                    // 20명 내외 등 그 외 (50명 미만): 매칭 중 멘트
                    sLeft.innerHTML = `🚀 실시간 매칭 중...`;
                    sRight.innerHTML = `💬 원활한 대화 가능`;
                }
            } else {
                statsBar.style.display = 'none';
            }
        });

        function send(event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const i = document.getElementById('msg-input'), v = i.value.trim(), cb = document.getElementById('chat-box');
            if (!v || i.disabled || !socket.connected) { i.focus(); return; }
            if (v === lastMessage) {
                repeatCount++;
                if (repeatCount >= 5) {
                    if (!alertShown) { cb.innerHTML += `<div class="system" style="color:var(--error); border:1px solid var(--error); font-weight:bold;">⚠️ 도배 방지: 동일 문구 전송 불가</div>`; alertShown = true; scrollToBottom(); }
                    i.focus(); return;
                }
            } else { repeatCount = 1; alertShown = false; }
            socket.emit('message', v); lastMessage = v; i.value = '';
            setTimeout(() => { i.focus(); }, 10);
        }
// 입력창에 타자 칠 때마다 서버에 알림
document.getElementById('msg-input').addEventListener('input', (e) => {
    const val = e.target.value.trim();
    if (val.length > 0) {
        socket.emit('typing');       // 글자가 있으면 타이핑 중!
    } else {
        socket.emit('stop-typing');  // 글자를 다 지우면 즉시 멈춤!
    }
});

// [기존 코드 시작] function setInputState(e) { ...
        function setInputState(e) {
            const i = document.getElementById('msg-input'), b = document.getElementById('send-btn');
            i.disabled = !e; b.disabled = !e; i.placeholder = e ? "메시지 입력..." : "상대를 찾는 중...";
            if (e) setTimeout(() => i.focus(), 150);
        }

        function scrollToBottom() { const c = document.getElementById('chat-box'); c.scrollTop = c.scrollHeight; }
        function requestRematch() { if (confirm("다음 상대를 찾을까요?")) socket.emit('re-match'); }
        function exitToSetup() { if (confirm("나갈까요?")) location.reload(); }
        function blockUser() { if (confirm("차단하고 다음 상대를 찾을까요?")) socket.emit('block-user'); }
    </script>
    <div style="font-size: 8px; color: rgba(255,255,255,0.05); text-align: center; margin-top: 10px;">
        #나나라이브 #실시간채팅 #랜덤채팅 #익명채팅 #가가라이브같은사이트
    </div>
</body>

</html>
