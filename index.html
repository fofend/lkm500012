<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나나라이브 - 실시간 익명 채팅</title>
    <meta name="description" content="나나라이브에서 실시간 익명 채팅과 랜덤 채팅을 즐겨보세요.">
    <meta property="og:title" content="나나라이브">
    <meta property="og:description" content="실시간 익명 채팅 및 랜덤 채팅">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nana-live.onrender.com/">
    <style>
        html {
            background-color: #fff !important;
            margin: 0;
            padding: 0;
            height: 100%;
        }

        @keyframes flow {
            from { background-position: 0% 50%; }
            to { background-position: 100% 50%; }
        }

        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(15px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #opening-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #1a0525, #6c3483, #8e44ad, #c15ee2);
            background-size: 300% 300%;
            animation: flow 4s ease-out forwards;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .main-logo-style {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 25px rgba(0,0,0,0.4);
            letter-spacing: -2px;
            margin: 0;
            padding: 0;
            transition: opacity 1s ease;
        }

        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; height: 100dvh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(-45deg, #1a0525, #6c3483, #8e44ad, #c15ee2);
            background-size: 300% 300%;
            transition: opacity 1s ease;
        }

        .setup-content-wrapper {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 1;
        }

        :root {
            --primary: #8E44AD;
            --error: #FF3B30;
            --bg-gradient: linear-gradient(135deg, #2c0a3d 0%, #8e44ad 50%, #c15ee2 100%);
            --card: rgba(255, 255, 255, 0.95);
            --male: #007AFF;
            --female: #FF2D55;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html {
            background: var(--bg-gradient) no-repeat center center fixed;
            background-size: cover;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            background: transparent;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            color: #fff;
        }

        .stats-bar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: rgba(0, 0, 0, 0.5);
    color: rgba(255, 255, 255, 0.95);
    font-size: 11px;
    padding: 7px 15px;
    display: none;
    justify-content: space-between;
    z-index: 2002;
    backdrop-filter: blur(8px);
    font-weight: 500;
}

        .swipe-transition {
            transition: transform 0.55s cubic-bezier(0.19, 1, 0.22, 1),
                        opacity 0.4s ease-out !important;
        }

        .top-bar {
    position: fixed;
    top: 31px; /* stats-bar 바로 아래 */
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: #fff;
    padding: 12px 15px;
    display: none;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #d1d1d6;
    z-index: 2001;
    color: #000;
}

        #setup-screen {
            padding: 40px 25px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #setup-screen h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .step-container {
            display: none;
            width: 100%;
            max-width: 320px;
            flex-direction: column;
            align-items: center;
        }

        .step-container.active {
            display: flex;
        }

        .step-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .modern-input {
            width: 100%;
            height: 56px;
            border-radius: 18px;
            background: var(--card);
            border: none;
            padding: 0 20px;
            font-size: 18px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            color: #000;
        }

        .option-btn {
            width: 100%;
            padding: 20px;
            margin: 8px 0;
            border-radius: 18px;
            border: none;
            background: var(--card);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
        }

        .btn-next-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #fff;
            color: var(--primary);
            border: none;
            font-size: 24px;
            font-weight: bold;
        }

        #chat-screen {
    display: none;
    flex-direction: column;
    height: calc(100dvh - 76px); /* 상단 2줄 높이만큼 빼기 */
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background-color: #fff;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    overflow: hidden;
}

        #chat-box {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #fff;
        }

        .msg-line {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .msg-line.me {
            align-items: flex-end;
        }

        .msg-line.partner {
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-all;
            max-width: 85%;
        }

        .me .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .partner .bubble {
            background: #f2f2f7;
            color: black;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            background: #fff;
            border-top: 1px solid #eee;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #eee;
            border-radius: 25px;
            outline: none;
            background: #f8f8f8;
            font-size: 16px;
        }

        .system {
            align-self: center;
            margin: 12px auto;
            font-size: 12px;
            color: #8e8e93;
            background: #f2f2f7;
            padding: 8px 15px;
            border-radius: 15px;
            width: fit-content;
            text-align: center;
            line-height: 1.5;
            word-break: keep-all;
        }

        .gender-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            margin-right: 4px;
            vertical-align: middle;
        }

        .typing-bubble {
            display: flex;
            gap: 4px;
            padding: 12px 18px !important;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #8e8e93;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .swipe-transition {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        opacity 0.4s ease-out !important;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }
    </style>
</head>

<body>
    <div id="opening-screen">
        <h1 class="main-logo-style" style="animation: fadeInLogo 1.5s 0.3s ease-out forwards; opacity: 0;">
            나나라이브
        </h1>
    </div>

    <div id="setup-screen" style="display: none; opacity: 0;">
        <div class="setup-content-wrapper">
            <div class="step-container active" id="step-1">
                <div class="step-title">어떤 닉네임을 쓰실까요?</div>
                <input type="text" id="nickname" class="modern-input" placeholder="닉네임 입력 (최대 8자)" maxlength="8" onkeypress="if(event.keyCode==13) goNext(1)">
                <button class="btn-next-circle" onclick="goNext(1)">➔</button>
            </div>

            <div class="step-container" id="step-2">
                <div class="step-title">본인의 성별을 선택해 주세요.</div>
                <button class="option-btn" onclick="selectGender('male')">🙋‍♂️ 남성</button>
                <button class="option-btn" onclick="selectGender('female')">🙋‍♀️ 여성</button>
            </div>

            <div class="step-container" id="step-3">
                <div class="step-title">누구와 대화하고 싶나요?</div>
                <button class="option-btn" onclick="selectWantGender('all')">🌈 누구나</button>
                <button class="option-btn" onclick="selectWantGender('female')">🙋‍♀️ 여성만</button>
                <button class="option-btn" onclick="selectWantGender('male')">🙋‍♂️ 남성만</button>
            </div>

            <div class="step-container" id="step-4">
                <div class="step-title">관심사를 적어주세요 (선택)</div>
                <input type="text" id="interest" class="modern-input" placeholder="예: 운동, 음악, 수다" maxlength="15" onkeypress="if(event.keyCode==13) startMatching()">
                <button onclick="startMatching()" style="width:100%; background:#fff; color:var(--primary); padding:20px; border-radius:18px; font-size:24px; font-weight:900; border:none; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">매칭 시작하기 🚀</button>
            </div>
        </div>
    </div>

    <div class="stats-bar" id="top-stats">
        <span id="stat-left">실시간 매칭 중...</span>
        <span id="stat-right">매칭 상태 원활</span>
    </div>

    <div class="top-bar" id="chat-top-bar">
        <button style="color:var(--error); background:none; border:none; font-weight:600;"
            onmousedown="blockUser(); return false;">🚫 차단</button>
        <span style="font-weight: 800; font-size: 17px; letter-spacing: -1px;">나나라이브</span>
        <button style="color:#8e8e93; background:none; border:none;"
            onmousedown="exitToSetup(); return false;">나가기</button>
    </div>

    <div id="chat-screen">
        <div id="chat-box"></div>

        <div id="ad-container" style="display: none; width: 100%; background: #f8f8f8; text-align: center;">
            <p style="font-size: 10px; color: #999; margin: 8px 0 3px 0;">추천 상품</p>
            <div id="ad-content-area" style="min-height: 50px;"></div>
        </div>

        <div class="input-area">
            <div class="btn-group">
                <button onclick="requestRematch()" style="background:#eee; padding: 10px 15px; border-radius: 20px; border:none; font-size:13px; font-weight:bold; flex-shrink:0;">다음</button>
                <input type="text" id="msg-input" placeholder="상대를 찾는 중..." disabled onkeypress="if(event.keyCode==13) send(event)">
                <button id="send-btn" disabled onclick="send(event)" style="background:var(--primary); color:white; width:42px; height:42px; border:none; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px;">✈️</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ reconnection: true });

        let myData = { nickname: '', gender: '', wantGender: '', interest: '' };
        let currentStep = 1;
        let partnerGender = "";
        let partnerNickname = "";
        let partnerInterest = "";
        let lastMessage = "";
        let repeatCount = 0;
        let alertShown = false;
        let isRematching = false;
        let lastEnterTime = 0;

        let typingTimeout;
        let startX = 0;
        let currentX = 0;
        let lastTap = 0;

        const chatScreen = document.getElementById('chat-screen');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        function goNext(step) {
            if (step === 1) {
                const nick = document.getElementById('nickname').value.trim();
                if (!nick) return alert("닉네임을 입력해 주세요!");
                myData.nickname = nick;
            }

            const currentElem = document.getElementById(`step-${currentStep}`);
            if (currentElem) {
                currentElem.classList.remove('active');
                currentElem.style.display = 'none';
            }

            currentStep = step + 1;

            const nextElem = document.getElementById(`step-${currentStep}`);
            if (nextElem) {
                nextElem.classList.add('active');
                nextElem.style.display = 'flex';
            }
        }

        function selectGender(v) {
            myData.gender = v;
            goNext(2);
        }

        function selectWantGender(v) {
            myData.wantGender = v;
            goNext(3);
        }

        function startMatching() {
            myData.nickname = document.getElementById('nickname').value.trim() || "익명";
            myData.interest = document.getElementById('interest').value.trim();

            socket.emit('join', myData);

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-top-bar').style.display = 'flex';
            document.getElementById('top-stats').style.display = 'flex';
            document.getElementById('ad-container').style.display = 'block';

            chatBox.innerHTML = '<div class="system">🚀 새로운 상대를 검색 중입니다...</div>';
            setInputState(false);
        }

        socket.on('partner-typing', () => {
            let loader = document.getElementById('typing-loader');

            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'typing-loader';
                loader.className = 'msg-line partner';
                loader.innerHTML = `
                    <div class="bubble typing-bubble" style="padding: 10px 15px;">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>`;
                chatBox.appendChild(loader);
                loader.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                const currentLoader = document.getElementById('typing-loader');
                if (currentLoader) currentLoader.remove();
            }, 2500);
        });

        socket.on('stop-partner-typing', () => {
            const loader = document.getElementById('typing-loader');
            if (loader) loader.remove();
            if (typingTimeout) clearTimeout(typingTimeout);
        });

        socket.on('matched', (d) => {
            isRematching = false;

            partnerGender = d.partnerGender;
            partnerNickname = d.partnerNickname;
            partnerInterest = d.partnerInterest;

            hideAd();

            const tagColor = partnerGender === 'male' ? 'var(--male)' : 'var(--female)';
            const tagText = partnerGender === 'male' ? '남' : '여';
            const interestTxt = partnerInterest
                ? ` <span style="color:#8e8e93; font-weight:normal;">(${partnerInterest})</span>`
                : "";

            chatBox.innerHTML = `
                <div class="system">
                    <span class="gender-tag" style="background:${tagColor}">${tagText}</span> 
                    <b>${partnerNickname}</b>님과 연결되었습니다.${interestTxt}
                </div>`;

            setInputState(true);
            scrollToBottom();
        });

        socket.on('message-ok', (t) => {
            chatBox.innerHTML += `<div class="msg-line me"><div class="bubble">${escapeHtml(t)}</div></div>`;
            scrollToBottom();
        });

        socket.on('chat-msg', (d) => {
            const loader = document.getElementById('typing-loader');
            if (loader) loader.remove();

            const tagColor = partnerGender === 'male' ? 'var(--male)' : 'var(--female)';
            const tagText = partnerGender === 'male' ? '남' : '여';
            const interestDisplay = partnerInterest
                ? `<span style="font-size:11px; color:#aaa; margin-left:4px;">(${escapeHtml(partnerInterest)})</span>`
                : "";

            chatBox.innerHTML += `
                <div class="msg-line partner" style="margin-top: 12px;">
                    <div style="margin-bottom: 3px; padding-left: 5px; display: flex; align-items: center;">
                        <span class="gender-tag" style="background:${tagColor}; margin-right:5px;">${tagText}</span>
                        <span style="font-size:13px; font-weight:600; color:#333;">${escapeHtml(partnerNickname)}</span>
                        ${interestDisplay}
                    </div>
                    <div class="bubble">${escapeHtml(d.text)}</div>
                </div>`;
            scrollToBottom();
        });

        socket.on('partner-left', (m) => {
            isRematching = false;
            socket.roomId = null;

            document.getElementById('ad-container').style.display = 'block';

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const tipMsg = isMobile
                ? "📱 화면을 <b>두 번 톡톡</b> 두드려보세요!"
                : "⌨️ <b>엔터(Enter) 두 번</b>으로 매칭 시작!";

            chatBox.innerHTML += `
                <div class="system">⚠️ ${escapeHtml(m)}</div>
                <div class="system" style="background:#f2f2f7; color:#8e8e93; border: 1px dashed #d1d1d6; margin-top:10px;">
                    ${tipMsg}
                </div>`;
            setInputState(false);
        });

        socket.on('start-re-match', () => {
            socket.emit('join', myData);
            chatBox.innerHTML = '<div class="system">🚀 새로운 상대를 검색 중입니다...</div>';
            setInputState(false);
        });

        socket.on('server-stats', (d) => {
            const statsBar = document.getElementById('top-stats');
            const sLeft = document.getElementById('stat-left');
            const sRight = document.getElementById('stat-right');

            if (document.getElementById('chat-screen').style.display === 'flex') {
                statsBar.style.display = 'flex';

                if (d.currentUsers >= 50) {
                    sLeft.innerHTML = `접속자: <span>${d.currentUsers}</span>명`;
                    sRight.innerHTML = `대기중: <span>${d.waiting}</span>명`;
                } else if (d.currentUsers <= 5) {
                    sLeft.innerHTML = `🚀 실시간 매칭 중...`;
                    sRight.innerHTML = `✨ 매칭 상태 원활`;
                } else {
                    sLeft.innerHTML = `🚀 실시간 매칭 중...`;
                    sRight.innerHTML = `💬 원활한 대화 가능`;
                }
            } else {
                statsBar.style.display = 'none';
            }
        });

        function send(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }

            const v = msgInput.value.trim();
            if (!v || msgInput.disabled || !socket.connected) {
                msgInput.focus();
                return;
            }

            if (v === lastMessage) {
                repeatCount++;
                if (repeatCount >= 5) {
                    if (!alertShown) {
                        chatBox.innerHTML += `<div class="system" style="color:var(--error); border:1px solid var(--error); font-weight:bold;">⚠️ 도배 방지: 동일 문구 전송 불가</div>`;
                        alertShown = true;
                        scrollToBottom();
                    }
                    msgInput.focus();
                    return;
                }
            } else {
                repeatCount = 1;
                alertShown = false;
            }

            socket.emit('message', v);
            lastMessage = v;
            msgInput.value = '';

            setTimeout(() => {
                msgInput.focus();
            }, 10);
        }

        msgInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val.length > 0) {
                socket.emit('typing');
            } else {
                socket.emit('stop-typing');
            }
        });

        function setInputState(enabled) {
            msgInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            msgInput.placeholder = enabled ? "메시지 입력..." : "상대를 찾는 중...";
            if (enabled) setTimeout(() => msgInput.focus(), 150);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function requestRematch() {
            triggerAutoMatch();
        }

        function triggerAutoMatch() {
            if (isRematching) return;

            isRematching = true;
            socket.roomId = null;
            socket.emit('re-match');

            chatBox.innerHTML = '<div class="system">🚀 새로운 인연을 찾는 중...</div>';
            setInputState(false);
            showAd();
        }

        function exitToSetup() {
            if (confirm("나갈까요?")) location.reload();
        }

        function blockUser() {
            if (confirm("차단하고 다음 상대를 찾을까요?")) {
                socket.roomId = null;
                socket.emit('block-user');
            }
        }

        document.addEventListener('keydown', (e) => {
            const isChatVisible = document.getElementById('chat-screen').style.display === 'flex';
            if (!isChatVisible) return;

            if (e.shiftKey && (e.key === '.' || e.key === '>')) {
                e.preventDefault();
                document.activeElement.blur();

                if (confirm("현재 대화를 종료하고 다음 상대를 찾을까요?")) {
                    triggerAutoMatch();
                } else if (!msgInput.disabled) {
                    msgInput.focus();
                }
                return;
            }

            if (e.key === 'Enter' && msgInput.disabled) {
                const currentTime = Date.now();

                if (currentTime - lastEnterTime < 300) {
                    e.preventDefault();
                    triggerAutoMatch();
                    lastEnterTime = 0;
                } else {
                    lastEnterTime = currentTime;
                }
            }
        }, true);

        document.addEventListener('touchstart', (e) => {
            if (chatScreen.style.display !== 'flex') return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;

            startX = e.touches[0].clientX;
            currentX = startX;
            chatScreen.classList.remove('swipe-transition');
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (startX === 0) return;

            currentX = e.touches[0].clientX;
            const diff = currentX - startX;

            if (diff < 0) {
                const moveX = diff * 0.5;
                const rotate = diff / 35;
                chatScreen.style.transform = `translateX(calc(-50% + ${moveX}px)) rotate(${rotate}deg)`;
                chatScreen.style.opacity = 1 + (moveX / 800);
            }
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (startX === 0) return;

            if (currentX === 0 && e.changedTouches && e.changedTouches.length > 0) {
                currentX = e.changedTouches[0].clientX;
            }

            const diff = currentX - startX;
            const currentTime = Date.now();

            chatScreen.classList.add('swipe-transition');

            if (currentX !== 0 && diff < -100) {
                chatScreen.style.transform = `translateX(calc(-50% - 120%)) rotate(-15deg)`;
                chatScreen.style.opacity = '0';

                triggerAutoMatch();

                setTimeout(() => {
                    chatScreen.style.transform = 'translateX(-50%) rotate(0deg)';
                    chatScreen.style.opacity = '1';
                }, 450);
            } else {
                chatScreen.style.transform = 'translateX(-50%) rotate(0deg)';
                chatScreen.style.opacity = '1';

                const tapLength = currentTime - lastTap;
                if (Math.abs(diff) < 20) {
                    if (tapLength < 300 && tapLength > 0) {
                        if (msgInput.disabled) {
                            triggerAutoMatch();
                        }
                        lastTap = 0;
                    } else {
                        lastTap = currentTime;
                    }
                }
            }

            startX = 0;
            currentX = 0;
        }, { passive: true });

        window.addEventListener('load', () => {
            const opScreen = document.getElementById('opening-screen');
            const setupScreen = document.getElementById('setup-screen');

            setTimeout(() => {
                opScreen.style.opacity = '0';
                setupScreen.style.display = 'flex';

                setTimeout(() => {
                    opScreen.style.display = 'none';
                    setupScreen.style.opacity = '1';
                }, 1000);
            }, 3500);
        });

        function loadCoupangAd() {
            const adArea = document.getElementById('ad-content-area');
            adArea.innerHTML = '';

            const script = document.createElement('script');
            script.src = "https://ads-partners.coupang.com/g.js";

            window.ads_partners_config = {
                "adId": 834567,
                "width": 320,
                "height": 50,
                "type": "banner"
            };

            adArea.appendChild(script);
        }

        function showAd() {
            document.getElementById('ad-container').style.display = 'block';
            loadCoupangAd();
        }

        function hideAd() {
            document.getElementById('ad-container').style.display = 'none';
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>

    <div style="font-size: 8px; color: rgba(255,255,255,0.05); text-align: center; margin-top: 10px;">

    </div>
